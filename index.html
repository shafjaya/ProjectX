<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today</title>
  <style>
    :root {
      --color-background: #1a1f2e;
      --color-background-secondary: #222736;
      --color-background-tertiary: #1e2333;
      --color-background-hover: #1a1f2c;
      --color-border: rgba(255, 255, 255, 0.12);
      --color-text-primary: #e8eaf0;
      --color-text-muted: #6b7280;
      --color-text-secondary: #9ca3af;

      --color-do-first: #E24B4A;
      --color-schedule: #185FA5;
      --color-delegate: #BA7517;
      --color-drop: #888780;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--color-background);
      color: var(--color-text-primary);
      font-family: "Anthropic Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: var(--color-text-primary);
    }

    /* Matrix grid */
    .matrix {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      width: 100%;
      margin-bottom: 2rem;
    }

    .quadrant {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border);
      padding: 1.5rem;
    }

    .quadrant-header {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .quadrant-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .quadrant-header-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .quadrant-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .quadrant-description {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    /* Task list */
    .task-list {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .task-empty {
      font-size: 13px;
      color: var(--color-text-muted);
      text-align: center;
      margin: auto;
      padding: 2rem 0;
      width: 100%;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--color-background-tertiary);
      border: 0.5px solid var(--color-border);
      cursor: default;
    }

    .task:hover {
      background: var(--color-background-hover);
    }

    .task.completed {
      opacity: 0.5;
    }

    .task-checkbox {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--color-text-muted);
    }

    .task-mind-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-do-first);
      flex-shrink: 0;
    }

    .task-text {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-primary);
      flex-grow: 1;
    }

    .task.completed .task-text {
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    /* Add task section */
    .add-section {
      width: 100%;
    }

    .add-section-header {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-muted);
      margin-bottom: 0.75rem;
    }

    .add-row {
      display: flex;
      gap: 8px;
    }

    .add-input {
      flex-grow: 1;
      padding: 0.75rem;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    .add-input::placeholder {
      color: var(--color-text-muted);
    }

    .add-input:focus {
      border-color: rgba(255, 255, 255, 0.25);
    }

    .add-select {
      padding: 0.75rem;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .add-select option {
      background: var(--color-background-secondary);
    }

    .btn-mind {
      padding: 0.75rem;
      font-family: inherit;
      font-size: 13px;
      background: transparent;
      border: 0.5px solid var(--color-text-muted);
      color: var(--color-text-muted);
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-mind.active {
      background: var(--color-do-first);
      border-color: var(--color-do-first);
      color: #fff;
    }

    .btn-add {
      padding: 0.75rem 1rem;
      background: transparent;
      border: 0.5px solid var(--color-border);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-add:hover {
      background: var(--color-background-secondary);
    }
  </style>
</head>
<body>

  <h1>Today</h1>

  <div class="matrix">
    <!-- Do First -->
    <div class="quadrant" id="quadrant-do-first">
      <div class="quadrant-header">
        <div class="quadrant-dot" style="background: var(--color-do-first);"></div>
        <div class="quadrant-header-text">
          <span class="quadrant-title">Do First</span>
          <span class="quadrant-description">Urgent &amp; important</span>
        </div>
      </div>
      <div class="task-list" id="list-do-first"></div>
    </div>

    <!-- Schedule -->
    <div class="quadrant" id="quadrant-schedule">
      <div class="quadrant-header">
        <div class="quadrant-dot" style="background: var(--color-schedule);"></div>
        <div class="quadrant-header-text">
          <span class="quadrant-title">Schedule</span>
          <span class="quadrant-description">Not urgent but important</span>
        </div>
      </div>
      <div class="task-list" id="list-schedule"></div>
    </div>

    <!-- Delegate -->
    <div class="quadrant" id="quadrant-delegate">
      <div class="quadrant-header">
        <div class="quadrant-dot" style="background: var(--color-delegate);"></div>
        <div class="quadrant-header-text">
          <span class="quadrant-title">Delegate</span>
          <span class="quadrant-description">Urgent but not important</span>
        </div>
      </div>
      <div class="task-list" id="list-delegate"></div>
    </div>

    <!-- Drop -->
    <div class="quadrant" id="quadrant-drop">
      <div class="quadrant-header">
        <div class="quadrant-dot" style="background: var(--color-drop);"></div>
        <div class="quadrant-header-text">
          <span class="quadrant-title">Drop</span>
          <span class="quadrant-description">Neither urgent nor important</span>
        </div>
      </div>
      <div class="task-list" id="list-drop"></div>
    </div>
  </div>

  <!-- Add Task -->
  <div class="add-section">
    <div class="add-section-header">Add Task</div>
    <div class="add-row">
      <input
        type="text"
        class="add-input"
        id="task-input"
        placeholder="New task..."
        autocomplete="off"
      />
      <select class="add-select" id="task-quadrant">
        <option value="do-first">Do First</option>
        <option value="schedule">Schedule</option>
        <option value="delegate">Delegate</option>
        <option value="drop">Drop</option>
      </select>
      <button class="btn-mind" id="btn-mind">Mind-heavy</button>
      <button class="btn-add" id="btn-add">Add</button>
    </div>
  </div>

  <script>
    const tasks = [
      { id: 1, text: "Submit project proposal to client", quadrant: "do-first", mindHeavy: true,  completed: false },
      { id: 2, text: "Fix production login bug",          quadrant: "do-first", mindHeavy: false, completed: false },
      { id: 3, text: "Review Q2 goals and priorities",    quadrant: "schedule",  mindHeavy: true,  completed: false },
      { id: 4, text: "Plan next sprint backlog",          quadrant: "schedule",  mindHeavy: false, completed: false },
      { id: 5, text: "Reply to vendor email",             quadrant: "delegate",  mindHeavy: false, completed: false },
      { id: 6, text: "Book team lunch venue",             quadrant: "delegate",  mindHeavy: false, completed: false },
      { id: 7, text: "Reorganise desktop folders",        quadrant: "drop",      mindHeavy: false, completed: false },
      { id: 8, text: "Morning coffee",                    quadrant: "do-first",  mindHeavy: false, completed: true  },
    ];

    let nextId = 9;
    let mindHeavyActive = false;

    function renderAll() {
      const quadrants = ["do-first", "schedule", "delegate", "drop"];
      quadrants.forEach(q => {
        const list = document.getElementById("list-" + q);
        const qTasks = tasks.filter(t => t.quadrant === q);
        list.innerHTML = "";
        if (qTasks.length === 0) {
          list.innerHTML = '<div class="task-empty">No tasks</div>';
          return;
        }
        qTasks.forEach(task => {
          const el = document.createElement("div");
          el.className = "task" + (task.completed ? " completed" : "");
          el.innerHTML = `
            <input type="checkbox" class="task-checkbox" ${task.completed ? "checked" : ""} data-id="${task.id}" />
            ${task.mindHeavy ? '<div class="task-mind-dot"></div>' : ""}
            <span class="task-text">${escapeHtml(task.text)}</span>
          `;
          el.querySelector(".task-checkbox").addEventListener("change", function() {
            const t = tasks.find(t => t.id === parseInt(this.dataset.id));
            if (t) t.completed = this.checked;
            renderAll();
          });
          list.appendChild(el);
        });
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function addTask() {
      const input = document.getElementById("task-input");
      const text = input.value.trim();
      if (!text) return;
      const quadrant = document.getElementById("task-quadrant").value;
      tasks.push({ id: nextId++, text, quadrant, mindHeavy: mindHeavyActive, completed: false });
      input.value = "";
      mindHeavyActive = false;
      document.getElementById("btn-mind").classList.remove("active");
      renderAll();
      input.focus();
    }

    document.getElementById("btn-add").addEventListener("click", addTask);

    document.getElementById("task-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addTask();
    });

    document.getElementById("btn-mind").addEventListener("click", function() {
      mindHeavyActive = !mindHeavyActive;
      this.classList.toggle("active", mindHeavyActive);
    });

    renderAll();
  </script>
</body>
</html>
