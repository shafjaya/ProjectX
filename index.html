<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today</title>
  <style>
    :root {
      --color-background:           #161b27;
      --color-background-secondary: #1e2433;
      --color-background-tertiary:  #19202e;
      --color-border:               rgba(255,255,255,0.08);
      --color-border-secondary:     rgba(255,255,255,0.12);
      --color-border-tertiary:      rgba(255,255,255,0.06);
      --color-text-primary:         #e8eaf0;
      --color-text-secondary:       #9ca3af;
      --color-text-tertiary:        #6b7280;
      --color-do-first:             #E24B4A;
      --color-schedule:             #185FA5;
      --color-delegate:             #BA7517;
      --color-drop:                 #888780;
      --border-radius-md:           6px;
      --border-radius-lg:           10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url("https://images.unsplash.com/photo-1504870712357-65ea720d6078?q=80&w=3464&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
      background-size: cover;
      background-position: center;
      opacity: 0.20;
    }

    body {
      background: var(--color-background);
      color: var(--color-text-primary);
      font-family: "Anthropic Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      padding: 2rem 1.5rem 5rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 2rem;
    }

    h1 #current-date {
      font-size: 16px;
      font-weight: 400;
      color: var(--color-text-tertiary);
      margin-left: 0.5rem;
    }

    /* Matrix */
    .matrix {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      width: 100%;
      margin-bottom: 2rem;
    }

    .quadrant {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
      position: relative;
      opacity: 0.9;
    }

    /* Quadrant header */
    .quadrant-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }

    .quadrant-header-left {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .quadrant-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .quadrant-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .quadrant-description {
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin-top: 0.25rem;
    }

    /* Counts */
    .quadrant-counts {
      display: flex;
      flex-direction: row;
      gap: 12px;
    }

    .count-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .count-label {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }

    .count-number {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    /* Task list */
    .task-list {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .task-empty {
      font-size: 13px;
      color: var(--color-text-tertiary);
      text-align: center;
      padding: 2rem 1rem;
      margin: auto;
      width: 100%;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--color-background);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      cursor: grab;
    }

    .task:hover {
      background: var(--color-background-tertiary);
      border-color: var(--color-border-secondary);
    }

    .task.dragging {
      opacity: 0.35;
      cursor: grabbing;
    }

    .task-list.drag-over {
      outline: 1.5px dashed var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: rgba(255,255,255,0.03);
    }

    .task.completed {
      opacity: 0.5;
      background: var(--color-background-secondary);
    }

    .task-checkbox {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--color-text-tertiary);
    }

    .task-mind-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-do-first);
      flex-shrink: 0;
    }

    .task-text {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-primary);
      flex-grow: 1;
    }

    .task.completed .task-text {
      text-decoration: line-through;
      color: var(--color-text-tertiary);
    }

    /* Quadrant footer with trash */
    .quadrant-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.75rem;
    }

    .trash-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-tertiary);
      font-family: inherit;
      font-size: 12px;
      padding: 0.25rem 0;
    }

    .trash-btn:hover {
      color: var(--color-text-secondary);
    }

    .trash-btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .trash-btn .trash-count {
      font-size: 11px;
    }

    /* Trash drawer */
    .trash-drawer {
      display: none;
      margin-top: 0.5rem;
      border-top: 0.5px solid var(--color-border-tertiary);
      padding-top: 0.75rem;
    }

    .trash-drawer.open {
      display: block;
    }

    .trash-drawer-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-tertiary);
      margin-bottom: 0.5rem;
    }

    .trash-task-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .trash-task {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--color-background);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      opacity: 0.45;
      cursor: pointer;
    }

    .trash-task:hover {
      opacity: 0.7;
      border-color: var(--color-border-secondary);
    }

    .trash-task-checkbox {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--color-text-tertiary);
    }

    .trash-task-text {
      font-size: 13px;
      color: var(--color-text-tertiary);
      text-decoration: line-through;
      flex-grow: 1;
    }

    /* Add task section */
    .add-section {
      width: 100%;
      margin-bottom: 2rem;
    }

    .add-section-header {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-tertiary);
      margin-bottom: 1rem;
    }

    .add-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .add-input {
      flex-grow: 1;
      min-width: 200px;
      padding: 0.75rem;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    .add-input::placeholder { color: var(--color-text-tertiary); }
    .add-input:focus { border-color: rgba(255,255,255,0.22); }

    .add-select {
      padding: 0.75rem;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .add-select option { background: var(--color-background-secondary); }

    .btn-mind {
      padding: 0.75rem 1rem;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      color: var(--color-text-secondary);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-mind.active {
      background: var(--color-do-first);
      border-color: var(--color-do-first);
      color: #fff;
    }

    .btn-add {
      padding: 0.75rem 1rem;
      background: transparent;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-add:hover {
      background: var(--color-background-secondary);
      border-color: var(--color-border-secondary);
    }

    /* Quote section */
    .quote-section {
      width: 100%;
      text-align: center;
      padding: 1.5rem 1rem;
    }

    .quote-text {
      font-size: 14px;
      font-style: italic;
      color: var(--color-text-tertiary);
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 0.4rem;
    }

    .quote-author {
      font-size: 12px;
      color: var(--color-text-tertiary);
      opacity: 0.6;
    }

    /* Bikes carousel */
    .bikes-section {
      width: 100%;
      margin-bottom: 2rem;
    }

    .bikes-header {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-tertiary);
      margin-bottom: 1rem;
    }

    .carousel-wrapper {
      position: relative;
      overflow: hidden;
    }

    .carousel {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding-bottom: 0.5rem;
      scrollbar-width: none;
    }

    .carousel::-webkit-scrollbar { display: none; }

    .bike-card {
      min-width: 220px;
      max-width: 220px;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      scroll-snap-align: start;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .bike-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .bike-card-body {
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1;
    }

    .bike-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
      line-height: 1.4;
    }

    .bike-retailer {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }

    .bike-price {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-top: 0.2rem;
    }

    .btn-view {
      display: block;
      padding: 0.5rem 0.75rem;
      margin-top: 0.75rem;
      background: transparent;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-view:hover {
      background: var(--color-background-tertiary);
      border-color: var(--color-border-secondary);
    }

    .carousel-nav {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .carousel-btn {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      color: var(--color-text-secondary);
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-btn:hover {
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
    }

    @media (max-width: 900px) {
      body { padding: 1.75rem 1.25rem 5rem; }
    }

    @media (max-width: 640px) {
      body { padding: 1.25rem 1rem 5rem; }
      h1 { font-size: 22px; margin-bottom: 1.25rem; }
      .matrix { grid-template-columns: 1fr; gap: 1rem; }
      .add-select { flex: 1; }
    }
  </style>
</head>
<body>

  <h1>Today <span id="current-date"></span></h1>

  <div class="matrix">

    <div class="quadrant">
      <div class="quadrant-header">
        <div class="quadrant-header-left">
          <div class="quadrant-dot" style="background:var(--color-do-first)"></div>
          <div>
            <div class="quadrant-title">Do First</div>
            <div class="quadrant-description">Urgent &amp; important</div>
          </div>
        </div>
        <div class="quadrant-counts" id="counts-do-first">
          <div class="count-item"><span class="count-label">Done</span><span class="count-number" data-done>0</span></div>
          <div class="count-item"><span class="count-label">Left</span><span class="count-number" data-left>0</span></div>
        </div>
      </div>
      <div class="task-list" id="list-do-first"></div>
      <div class="quadrant-footer" id="footer-do-first"></div>
      <div class="trash-drawer" id="drawer-do-first">
        <div class="trash-drawer-header">Completed</div>
        <div class="trash-task-list" id="trash-list-do-first"></div>
      </div>
    </div>

    <div class="quadrant">
      <div class="quadrant-header">
        <div class="quadrant-header-left">
          <div class="quadrant-dot" style="background:var(--color-schedule)"></div>
          <div>
            <div class="quadrant-title">Schedule</div>
            <div class="quadrant-description">Not urgent but important</div>
          </div>
        </div>
        <div class="quadrant-counts" id="counts-schedule">
          <div class="count-item"><span class="count-label">Done</span><span class="count-number" data-done>0</span></div>
          <div class="count-item"><span class="count-label">Left</span><span class="count-number" data-left>0</span></div>
        </div>
      </div>
      <div class="task-list" id="list-schedule"></div>
      <div class="quadrant-footer" id="footer-schedule"></div>
      <div class="trash-drawer" id="drawer-schedule">
        <div class="trash-drawer-header">Completed</div>
        <div class="trash-task-list" id="trash-list-schedule"></div>
      </div>
    </div>

    <div class="quadrant">
      <div class="quadrant-header">
        <div class="quadrant-header-left">
          <div class="quadrant-dot" style="background:var(--color-delegate)"></div>
          <div>
            <div class="quadrant-title">Delegate</div>
            <div class="quadrant-description">Urgent but not important</div>
          </div>
        </div>
        <div class="quadrant-counts" id="counts-delegate">
          <div class="count-item"><span class="count-label">Done</span><span class="count-number" data-done>0</span></div>
          <div class="count-item"><span class="count-label">Left</span><span class="count-number" data-left>0</span></div>
        </div>
      </div>
      <div class="task-list" id="list-delegate"></div>
      <div class="quadrant-footer" id="footer-delegate"></div>
      <div class="trash-drawer" id="drawer-delegate">
        <div class="trash-drawer-header">Completed</div>
        <div class="trash-task-list" id="trash-list-delegate"></div>
      </div>
    </div>

    <div class="quadrant">
      <div class="quadrant-header">
        <div class="quadrant-header-left">
          <div class="quadrant-dot" style="background:var(--color-drop)"></div>
          <div>
            <div class="quadrant-title">Drop</div>
            <div class="quadrant-description">Neither urgent nor important</div>
          </div>
        </div>
        <div class="quadrant-counts" id="counts-drop">
          <div class="count-item"><span class="count-label">Done</span><span class="count-number" data-done>0</span></div>
          <div class="count-item"><span class="count-label">Left</span><span class="count-number" data-left>0</span></div>
        </div>
      </div>
      <div class="task-list" id="list-drop"></div>
      <div class="quadrant-footer" id="footer-drop"></div>
      <div class="trash-drawer" id="drawer-drop">
        <div class="trash-drawer-header">Completed</div>
        <div class="trash-task-list" id="trash-list-drop"></div>
      </div>
    </div>

  </div>

  <div class="quote-section">
    <div class="quote-text" id="quote-text"></div>
    <div class="quote-author" id="quote-author"></div>
  </div>

  <div class="add-section">
    <div class="add-section-header">Add Task</div>
    <div class="add-row">
      <input class="add-input" id="task-input" type="text" placeholder="New task..." autocomplete="off" />
      <select class="add-select" id="task-quadrant">
        <option value="do-first">Do First</option>
        <option value="schedule">Schedule</option>
        <option value="delegate">Delegate</option>
        <option value="drop">Drop</option>
      </select>
      <button class="btn-mind" id="btn-mind">+ Mind-heavy</button>
      <button class="btn-add" id="btn-add">Add</button>
    </div>
  </div>

  <div class="bikes-section">
    <div class="bikes-header">Found some free time?</div>
    <div class="carousel-wrapper">
      <div class="carousel" id="bike-carousel"></div>
      <div class="carousel-nav">
        <button class="carousel-btn" id="carousel-prev">&#8592;</button>
        <button class="carousel-btn" id="carousel-next">&#8594;</button>
      </div>
    </div>
  </div>

  <script>
    const tasks = [
      { id: 1, text: "Finish client proposal",   quadrant: "do-first", mindHeavy: true,  completed: false },
      { id: 2, text: "Code review for squad",     quadrant: "do-first", mindHeavy: false, completed: false },
      { id: 3, text: "Team standup",              quadrant: "do-first", mindHeavy: true,  completed: false },
      { id: 4, text: "Morning coffee",            quadrant: "do-first", mindHeavy: false, completed: true  },
      { id: 5, text: "Plan Q3 roadmap",           quadrant: "schedule", mindHeavy: true,  completed: false },
      { id: 6, text: "Learn new framework",       quadrant: "schedule", mindHeavy: false, completed: false },
      { id: 7, text: "Review emails",             quadrant: "delegate", mindHeavy: false, completed: false },
      { id: 8, text: "Scroll social media",       quadrant: "drop",     mindHeavy: false, completed: false },
    ];

    let nextId = 9;
    let mindHeavyActive = false;
    const drawerOpen = {};

    const TRASH_ICON = `<svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M3 3.5l.667 7.5a.5.5 0 0 0 .499.5h5.668a.5.5 0 0 0 .499-.5L11 3.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    function makeTaskEl(task, inTrash) {
      const el = document.createElement("div");
      el.className = inTrash ? "trash-task" : "task" + (task.completed ? " completed" : "");

      if (!inTrash) {
        el.draggable = true;
        el.addEventListener("dragstart", e => {
          e.dataTransfer.setData("taskId", task.id);
          e.dataTransfer.effectAllowed = "move";
          el.classList.add("dragging");
        });
        el.addEventListener("dragend", () => el.classList.remove("dragging"));
      }

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.className = inTrash ? "trash-task-checkbox" : "task-checkbox";
      cb.checked = task.completed;
      cb.addEventListener("change", () => {
        task.completed = cb.checked;
        renderAll();
      });
      el.appendChild(cb);

      if (!inTrash && task.mindHeavy) {
        const dot = document.createElement("div");
        dot.className = "task-mind-dot";
        el.appendChild(dot);
      }

      const span = document.createElement("span");
      span.className = inTrash ? "trash-task-text" : "task-text";
      span.textContent = task.text;
      el.appendChild(span);

      el.addEventListener("click", e => {
        if (e.target === cb) return;
        cb.checked = !cb.checked;
        task.completed = cb.checked;
        renderAll();
      });

      return el;
    }

    function renderAll() {
      ["do-first","schedule","delegate","drop"].forEach(q => {
        const qTasks = tasks.filter(t => t.quadrant === q);
        const completedTasks = qTasks.filter(t => t.completed);
        const activeTasks = qTasks.filter(t => !t.completed);
        const done = completedTasks.length;
        const left = activeTasks.length;

        // Update counts
        const counts = document.getElementById("counts-" + q);
        counts.querySelector("[data-done]").textContent = done;
        counts.querySelector("[data-left]").textContent = left;

        // Render main list: active tasks + 3 most recent completed
        const list = document.getElementById("list-" + q);
        list.innerHTML = "";

        const visibleCompleted = completedTasks.slice(-3);
        const overflowCompleted = completedTasks.slice(0, -3);
        const visibleTasks = [...activeTasks, ...visibleCompleted];

        if (visibleTasks.length === 0) {
          list.innerHTML = '<div class="task-empty">No tasks</div>';
        } else {
          visibleTasks.forEach(task => list.appendChild(makeTaskEl(task, false)));
        }

        // Render footer trash button
        const footer = document.getElementById("footer-" + q);
        footer.innerHTML = "";
        if (overflowCompleted.length > 0) {
          const btn = document.createElement("button");
          btn.className = "trash-btn";
          btn.innerHTML = TRASH_ICON + `<span class="trash-count">${overflowCompleted.length} older tasks</span>`;
          btn.addEventListener("click", () => {
            drawerOpen[q] = !drawerOpen[q];
            document.getElementById("drawer-" + q).classList.toggle("open", drawerOpen[q]);
          });
          footer.appendChild(btn);
        } else {
          drawerOpen[q] = false;
          document.getElementById("drawer-" + q).classList.remove("open");
        }

        // Render trash drawer
        const trashList = document.getElementById("trash-list-" + q);
        trashList.innerHTML = "";
        overflowCompleted.forEach(task => trashList.appendChild(makeTaskEl(task, true)));
      });
    }

    function addTask() {
      const input = document.getElementById("task-input");
      const text = input.value.trim();
      if (!text) return;
      tasks.push({
        id: nextId++,
        text,
        quadrant: document.getElementById("task-quadrant").value,
        mindHeavy: mindHeavyActive,
        completed: false,
      });
      input.value = "";
      mindHeavyActive = false;
      const btnMind = document.getElementById("btn-mind");
      btnMind.classList.remove("active");
      btnMind.textContent = "+ Mind-heavy";
      renderAll();
      input.focus();
    }

    document.getElementById("btn-add").addEventListener("click", addTask);
    document.getElementById("task-input").addEventListener("keydown", e => {
      if (e.key === "Enter") addTask();
    });
    document.getElementById("btn-mind").addEventListener("click", function() {
      mindHeavyActive = !mindHeavyActive;
      this.classList.toggle("active", mindHeavyActive);
      this.textContent = mindHeavyActive ? "🧠 Mind-heavy" : "+ Mind-heavy";
    });

    (function buildCarousel() {
      const carousel = document.getElementById("bike-carousel");
      BIKES.forEach(bike => {
        const card = document.createElement("div");
        card.className = "bike-card";
        const img = document.createElement("img");
        img.src = bike.image;
        img.alt = bike.name;
        img.loading = "lazy";
        img.onerror = function() {
          this.style.display = "none";
          const ph = document.createElement("div");
          ph.style.cssText = "width:100%;height:150px;background:linear-gradient(135deg,#1e2433 0%,#2a3347 100%);display:flex;align-items:center;justify-content:center;color:#4b5563;font-size:28px;";
          ph.textContent = "🚵";
          card.prepend(ph);
        };
        card.appendChild(img);
        card.innerHTML += `
          <div class="bike-card-body">
            <div class="bike-name">${bike.name}</div>
            <div class="bike-retailer">${bike.retailer}</div>
            <div class="bike-price">${bike.price}</div>
            <a class="btn-view" href="${bike.url}" target="_blank" rel="noopener noreferrer">View More</a>
          </div>
        `;
        carousel.appendChild(card);
      });

      function scrollCarousel(dir) {
        const card = carousel.querySelector(".bike-card");
        const amount = card ? (card.offsetWidth + 16) * dir : 236 * dir;
        carousel.scrollBy({ left: amount, behavior: "smooth" });
      }
      document.getElementById("carousel-prev").addEventListener("click", () => scrollCarousel(-1));
      document.getElementById("carousel-next").addEventListener("click", () => scrollCarousel(1));
    })();

    (function showQuote() {
      const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      document.getElementById("quote-text").textContent = "“" + q.text + "”";
      document.getElementById("quote-author").textContent = "— " + q.author;
    })();

    ["do-first", "schedule", "delegate", "drop"].forEach(q => {
      const list = document.getElementById("list-" + q);
      list.addEventListener("dragover", e => {
        e.preventDefault();
        list.classList.add("drag-over");
      });
      list.addEventListener("dragleave", () => list.classList.remove("drag-over"));
      list.addEventListener("drop", e => {
        e.preventDefault();
        list.classList.remove("drag-over");
        const id = parseInt(e.dataTransfer.getData("taskId"));
        const task = tasks.find(t => t.id === id);
        if (task && task.quadrant !== q) {
          task.quadrant = q;
          renderAll();
        }
      });
    });

    document.getElementById("current-date").textContent = new Date().toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
